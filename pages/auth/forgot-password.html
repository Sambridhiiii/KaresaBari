<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KaresaBari | Forgot Password</title>
    <link rel="stylesheet" href="../../css/auth.css">
</head>
<body>
<div class="auth-card">
    <div class="logo-container">
        <img src="../../public/images/header.png" class="logo-img" alt="Logo">
    </div>
    <h1 class="title">Reset Access</h1>
    <p class="subtitle">Enter your email to recover your garden account</p>
    
    <form method="post" action="/forgot-password" novalidate>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" id="email" required placeholder="yourname@gmail.com">
        </div>
        <button type="submit" class="btn-primary">Send Reset Link</button>
    </form>
    <div class="auth-links"><a href="/login">Back to Login</a></div>
</div>

<div id="backendError" style="display: none;">{{ error if error else '' }}</div>

<!-- Popup Modal -->
<div id="popupModal" class="modal-overlay">
    <div class="modal-box error">
        <span class="modal-icon">⚠️</span>
        <h3 id="modalTitle">Notice</h3>
        <p id="modalDesc"></p>
        <button onclick="document.getElementById('popupModal').style.display='none'" class="modal-btn">OK</button>
    </div>
</div>

<script>
    window.onload = () => {
        const err = document.getElementById('backendError').innerText;
        if (err.trim().length > 0) {
            document.getElementById('modalDesc').innerText = err;
            document.getElementById('popupModal').style.display = 'flex';
        }
    };
</script>
</body>
</html>
