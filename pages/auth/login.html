<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaresaBari | Login</title>
    <link rel="stylesheet" href="../../css/auth.css">
</head>
<body>

<div class="auth-card">
    <div class="logo-container">
        <img src="../../public/images/header.png" class="logo-img" alt="Logo">
    </div>
    <h1 class="title">Welcome Back</h1>
    <p class="subtitle">Log in to manage your kitchen garden</p>
    
    <form id="loginForm" method="post" action="/login" novalidate>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" id="email" placeholder="KaresaBari@gmail.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" id="password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn-primary">Login to Dashboard</button>
    </form>

    <div class="auth-links" style="margin-top: 25px;">
        <a href="/forgot-password">Forgot password?</a> | <a href="/register">Create an account</a>
    </div>
</div>

<div id="backendError" style="display: none;">{{ error if error else '' }}</div>

<div id="popupModal" class="modal-overlay">
    <div id="modalBox" class="modal-box error">
        <span class="modal-icon">⚠️</span>
        <h3 id="modalTitle">Notice</h3>
        <p id="modalDesc"></p>
        <button onclick="closeModal()" class="modal-btn">OK</button>
    </div>
</div>

<script>
    const modal = document.getElementById('popupModal');
    const modalDesc = document.getElementById('modalDesc');
    const backendError = document.getElementById('backendError').innerText;

    function showPopup(msg) {
        modalDesc.innerText = msg;
        modal.style.display = 'flex';
    }

    function closeModal() { modal.style.display = 'none'; }

    window.onload = () => {
        if (backendError.trim().length > 0) {
            showPopup(backendError);
        }
    };

    document.getElementById('loginForm').onsubmit = (e) => {
        const email = document.getElementById('email').value.trim();
        const pass = document.getElementById('password').value;
        const gmailRegex = /^[^\s@]+@gmail\.com$/;

        if (!email) {
            e.preventDefault();
            showPopup("Email cannot be empty! 🌱");
        } else if (!gmailRegex.test(email)) {
            e.preventDefault();
            showPopup("Please include a valid '@gmail.com' in the email address.");
        } else if (!pass) {
            e.preventDefault();
            showPopup("Password cannot be empty! 🔑");
        }
    };
</script>
</body>
</html>
