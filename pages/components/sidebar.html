<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KaresaBari Sidebar</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

  <link rel="stylesheet" href="../../css/sidebar.css">
</head>

<body>

<aside class="sidebar">

  <!-- Logo Section -->
  <div class="logo">
    <img src="../../public/images/mainlogo.png" alt="Logo" class="logo-icon">
  </div>

  <!-- Navigation -->
  <nav class="nav">

    <a href="/admin/analytics" class="nav-item">
      <span class="material-symbols-outlined">analytics</span>
      <span>Analytics</span>
    </a>

    <a href="/admin/user" class="nav-item">
      <span class="material-symbols-outlined">group</span>
      <span>Users</span>
    </a>

    <a href="/admin/messages" class="nav-item">
      <span class="material-symbols-outlined">chat</span>
      <span>Messages</span>
    </a>

    <a href="/admin/notification" class="nav-item">
      <span class="material-symbols-outlined">notifications</span>
      <span>Notifications</span>
    </a>

    <!-- Removed active class -->
    <a href="/admin/toolsmanagement" class="nav-item">
      <span class="material-symbols-outlined">construction</span>
      <span>Tools</span>
    </a>

  </nav>

  <!-- Logout -->
  <div class="logout-container">
    <a href="/logout" class="logout-btn">
      <span class="material-symbols-outlined">logout</span>
      <span>Logout</span>
    </a>
  </div>

</aside>

</body>
</html>
